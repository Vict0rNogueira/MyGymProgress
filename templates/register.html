<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro - TOP TRAINING</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #000;
            color: #111;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: #f5f5f5;
            border: 1px solid #d9d9d9;
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            padding: 24px;
        }
        .subtle {
            color: #666;
        }
        .input-soft {
            background: #fff;
            border: 1px solid #cfcfcf;
            color: #111;
        }
        .btn-primary {
            background: #1f6feb;
            border-color: #1f6feb;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1 class="h4 mb-1">Criar conta</h1>
        <p class="subtle mb-3">Cadastre-se para começar a acompanhar seus treinos.</p>

        {% if error %}
            <div class="alert alert-danger py-2">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="mb-2">
                <label class="form-label">Usuário</label>
                <input name="username" class="form-control input-soft" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Senha</label>
                <input name="password" type="password" class="form-control input-soft" required>
            </div>
            <button class="btn btn-primary w-100">Registrar</button>
        </form>

        <p class="small mt-3 mb-0">
            Já tem conta? <a href="/login">Entrar</a>
        </p>
    </div>
</body>
</html>
